<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - Connexion / Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="toggle-buttons">
                <button id="loginBtn" class="toggle-btn active">Connexion</button>
                <button id="registerBtn" class="toggle-btn">Inscription</button>
            </div>

            <!-- Formulaire de Connexion -->
            <form id="loginForm" class="auth-form">
                <h2>Bienvenue</h2>
                <p class="subtitle">Connectez-vous à votre compte</p>
                
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" required placeholder="votre@email.com">
                    <span class="error-message" id="loginEmailError"></span>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="loginPassword" name="password" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Se souvenir de moi</span>
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>
                
                <button type="submit" class="submit-btn">Se connecter</button>
                
                <p class="form-footer">
                    Pas encore de compte ? <a href="#" id="switchToRegister">Créer un compte</a>
                </p>
            </form>

            <!-- Formulaire d'Inscription -->
            <form id="registerForm" class="auth-form hidden">
                <h2>Créer un compte</h2>
                <p class="subtitle">Rejoignez-nous dès maintenant</p>
                
                <div class="form-group">
                    <label for="registerName">Nom complet</label>
                    <input type="text" id="registerName" name="name" required placeholder="Jean Dupont">
                    <span class="error-message" id="registerNameError"></span>
                </div>
                
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" name="email" required placeholder="votre@email.com">
                    <span class="error-message" id="registerEmailError"></span>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="registerPassword" name="password" required placeholder="••••••••" minlength="8">
                        <button type="button" class="toggle-password" onclick="togglePassword('registerPassword')">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="password-requirements">Minimum 8 caractères</span>
                    <span class="error-message" id="registerPasswordError"></span>
                </div>
                
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirmer le mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="registerConfirmPassword" name="confirmPassword" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword('registerConfirmPassword')">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="registerConfirmPasswordError"></span>
                </div>
                
                <div class="form-group terms">
                    <label class="checkbox-label">
                        <input type="checkbox" id="acceptTerms" name="terms" required>
                        <span>J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a></span>
                    </label>
                    <span class="error-message" id="acceptTermsError"></span>
                </div>
                
                <button type="submit" class="submit-btn">Créer mon compte</button>
                
                <p class="form-footer">
                    Déjà un compte ? <a href="#" id="switchToLogin">Se connecter</a>
                </p>
            </form>
        </div>
        
        <div class="success-message hidden" id="successMessage">
            <div class="success-icon">✓</div>
            <h3>Opération réussie !</h3>
            <p id="successText">Redirection vers la page de connexion...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
