# Configuration du serveur
server.port=8080
spring.application.name=modele-memoire

# Configuration Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.votredomaine.modelememoire=DEBUG

# Configuration de la base de données MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/elearning_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=app_user
spring.datasource.password=app_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Note: Spring Boot détecte automatiquement le dialecte, vous pouvez même supprimer cette ligne
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect