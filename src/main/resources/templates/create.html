<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up </title>
    <link rel="stylesheet" href="css/create.css">
   
</head>
<body>
    <div class="container">
        <div class="signup-box">
           
            <div class="gradient-top"></div>
            <div class="gradient-small"></div>
            
            <div class="content">
                <h1>SIGN UP</h1>
                <p class="subtitle">TO CONTINUE</p>
                
               
                <form id="signupForm">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="name" placeholder="Enter your username" required>
                        
                        <div class="error-message" id="username-error"></div>
                    </div>
                
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        
                        <div class="error-message" id="email-error"></div>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                       
                        <div class="error-message" id="password-error"></div>
                    </div>
                    
                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                    
                        <div class="error-message" id="confirmPassword-error"></div>
                    </div>
                    
                    <button type="submit" class="signup-btn">SIGN UP</button>
                </form>
                
                <p class="login-link">Already have an account? <a th:href="@{/login}">Log in</a></p>
            </div>
        </div>
    </div>
    
    <!-- 🔥 MODIFICATION 6: Le script reste le même -->
    <script th:src="@{/js/create.js}"></script>
</body>
</html>
