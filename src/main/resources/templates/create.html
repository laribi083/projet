<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Modèle Mémoire</title>
    <link rel="stylesheet" href="css/create.css">
</head>
<body>
    <div class="container">
        <div class="signup-box">
           
            <div class="gradient-top"></div>
            <div class="gradient-small"></div>
            
            <div class="content">
                <h1>SIGN UP</h1>
                <p class="subtitle">TO CONTINUE</p>
                
                <form id="signupForm" th:action="@{/create}" method="post">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="name" placeholder="Entrez votre nom d'utilisateur" required>
                    </div>
                
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Entrez votre email" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
                    </div>
                     <div class="input-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmez votre mot de passe" required>
                    </div>
                    
                    <button type="submit" class="signup-btn">SIGN UP</button>
                </form>
                
                <p class="login-link">Already have an account? <a th:href="@{/login}">Log in</a></p>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/create.js}"></script>
</body>
</html>
