<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forget Password</title>
    <link rel="stylesheet" th:href="@{/css/forget.css}">
</head>
<body>
    <div class="container">
        <div class="signup-box">
            <div class="gradient-top"></div>
            <div class="gradient-small"></div>

            <div class="content">
                <h1>Forget Password</h1>
                <p class="subtitle">Recover your account</p>

                <form id="forgetForm" th:action="@{/forgot}" method="post">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        <div class="error-message" id="emailError">
                            Please enter a valid email
                        </div>
                        <label>Enter a new password</label>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <label>Confirm new password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new Password" required>
                    </div>

                    <button type="submit" class="signup-btn">
                        Send Reset Link
                    </button>
                </form>

                <div id="successMsg" class="success-message" style="display:none;">
                    Reset link sent successfully
                </div>

                <div class="login-link">
                    Back to
                    <a th:href="@{/login}">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/forget.js}"></script>
</body>
</html>
