<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Quiz - BrainLearning</title>
    <link rel="stylesheet" th:href="@{/cssTracher/dashbord.css}">
    <link rel="stylesheet" th:href="@{/cssTracher/quiz.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1><i class="fas fa-plus-circle"></i> Create New Quiz</h1>
            <p>Create a quiz for your students to test their knowledge</p>
        </div>
        
        <form id="quizForm">
            <input type="hidden" id="courseId" th:value="${courseId}">
            <input type="hidden" id="courseModule" th:value="${courseModule}">
            <input type="hidden" id="courseNiveau" th:value="${courseNiveau}">
            
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Quiz Title</label>
                <input type="text" id="quizTitle" placeholder="Ex: Algebra Fundamentals" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Duration (minutes)</label>
                    <input type="number" id="durationMinutes" value="30" min="5" max="180">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Passing Score (%)</label>
                    <input type="number" id="passingScore" value="60" min="0" max="100">
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea id="quizDescription" rows="3" placeholder="Describe what this quiz covers..."></textarea>
            </div>
            
            <div class="questions-section">
                <h2><i class="fas fa-list-ol"></i> Questions</h2>
                <div id="questionsContainer"></div>
                <button type="button" class="btn-add-question" onclick="addQuestion()">
                    <i class="fas fa-plus"></i> Add Question
                </button>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="cancelQuiz()">Cancel</button>
                <button type="submit" class="btn-submit">Create Quiz</button>
            </div>
        </form>
    </div>
    
    <script th:src="@{/jsTeacher/quiz.js}"></script>
</body>
</html>
