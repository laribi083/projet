<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le cours - BrainLearning</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" th:href="@{/cssTracher/dashbord.css}">
    <link rel="stylesheet" th:href="@{/cssTracher/editcourse.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="edit-container">
        <h1>
            <i class="fas fa-edit"></i> 
            Modifier le cours
        </h1>
        
        <form id="editCourseForm" 
              th:action="@{/teacher/update-course/{id}(id=${course.id})}" 
              method="post" 
              enctype="multipart/form-data">
            
            <input type="hidden" name="id" th:value="${course.id}">
            
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Titre du cours</label>
                <input type="text" id="title" name="title" th:value="${course.title}" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea id="description" name="description" rows="5" required th:text="${course.description}"></textarea>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Module</label>
                <input type="text" id="module" name="module" th:value="${course.module}" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-graduation-cap"></i> Niveau</label>
                <select id="niveau" name="niveau" required>
                    <option value="1year" th:selected="${course.niveau == '1year'}">1ère Année</option>
                    <option value="2year" th:selected="${course.niveau == '2year'}">2ème Année</option>
                    <option value="3year" th:selected="${course.niveau == '3year'}">3ème Année</option>
                </select>
            </div>
            
            <div id="currentFilesContainer" class="current-files" th:if="${course.fileNames != null and !course.fileNames.isEmpty()}">
                <h4><i class="fas fa-paperclip"></i> Fichiers actuels</h4>
                <ul id="currentFilesList" class="file-list">
                    <li th:each="fileName : ${course.fileNames}">
                        <i class="fas fa-file-alt"></i>
                        <span th:text="${fileName}"></span>
                    </li>
                </ul>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-plus-circle"></i> Ajouter de nouveaux fichiers</label>
                <input type="file" id="newFiles" name="newFiles" multiple accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.zip,.jpg,.jpeg,.png,.mp4">
                <small class="form-help">Vous pouvez ajouter plusieurs fichiers (PDF, images, vidéos)</small>
            </div>
            
            <div id="newFilesPreview" class="new-files-preview"></div>
            
            <div class="form-actions">
                <button type="submit" id="saveBtn" class="btn-save">
                    <i class="fas fa-save"></i> Enregistrer
                </button>
                <a th:href="@{/teacher/dashboard}" class="btn-cancel">
                    <i class="fas fa-times"></i> Annuler
                </a>
            </div>
        </form>
    </div>

    <!-- JavaScript File -->
    <script th:src="@{/jsTeacher/editcourse.js}"></script>
</body>
</html>
