<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Ratings - BrainLearning</title>
    <link rel="stylesheet" th:href="@{/cssTracher/dashbord.css}">
    <link rel="stylesheet" th:href="@{/cssTeacher/ratings.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <input type="hidden" id="teacherId" th:value="${teacherId}" />
    <input type="hidden" id="teacherName" th:value="${teacherName}" />
    <input type="hidden" id="teacherEmail" th:value="${teacherEmail}" />

    <div class="sidebar">
        <div class="logo">Brain<span>learning</span></div>
        <div class="user-profile">
            <div class="user-avatar">
                <img id="userAvatar" src="" alt="User Avatar">
            </div>
            <h3 id="userName">Professor</h3>
            <p th:text="${teacherEmail}" class="user-email">email@example.com</p>
            <p class="user-role">👨‍🏫 Teacher</p>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="/teacher/dashboard" class="nav-link">📚 My Courses</a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link active" id="ratingsLink">⭐ Course Ratings</a>
            </li>
        </ul>
        <div class="logout-btn-sidebar" onclick="logout()">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="ratings-container">
            <div class="ratings-header">
                <h1><i class="fas fa-star"></i> Course Ratings</h1>
                <p>View all ratings and feedback from students</p>
            </div>

            <div class="stats-summary">
                <div class="stat-box">
                    <div class="number" id="totalCourses">0</div>
                    <div class="label">Courses with ratings</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="totalRatings">0</div>
                    <div class="label">Total ratings received</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="avgOverall">0</div>
                    <div class="label">Overall average</div>
                </div>
            </div>

            <div id="ratingsContainer">
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading ratings...</div>
            </div>
        </div>
    </div>

    <script th:src="@{/jsTeacher/ratings.js}"></script>
</body>
</html>
