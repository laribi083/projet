<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Levels</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="level.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="top">
            <h2>Admin Panel</h2>
            <i class="fas fa-bars" id="toggleBtn"></i>
        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li class="active">
                <a href="user.html">
                    <i class="fas fa-users"></i>
                    <span>Users Management</span>
                </a>
            </li>

            <li class="active">
                <a href="level.html">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Educational Levels</span>
                </a>
            </li>

            <li>
                <a href="valid.html">
                    <i class="fas fa-check-square"></i>
                    <span>Course Verification</span>
                </a>
            </li>

        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h1>Educational Levels</h1>
            <p>Manage levels, semesters and modules</p>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <div class="icon blue"><i class="fas fa-layer-group"></i></div>
                <div>
                    <p>Levels</p>
                    <h2>3</h2>
                </div>
            </div>

            <div class="card">
                <div class="icon greenBg"><i class="fas fa-calendar"></i></div>
                <div>
                    <p>Semesters</p>
                    <h2>6</h2>
                </div>
            </div>

            <div class="card">
                <div class="icon yellow"><i class="fas fa-book"></i></div>
                <div>
                    <p>Modules</p>
                    <h2>12</h2>
                </div>
            </div>
        </div>

        <!-- LEVELS -->
        <div class="levels-container" id="levelsContainer"></div>

    </div>

    <script src="dashboard.js"></script>
    <script src="level.js"></script>

</body>

</html>
