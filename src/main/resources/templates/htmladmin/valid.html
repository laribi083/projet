<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Course Validation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="valid.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="top">
            <h2>Admin Panel</h2>
            <i class="fas fa-bars" id="toggleBtn"></i>
        </div>

        <ul class="menu">

            <li>
                <a href="dashboard.html">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li>
                <a href="user.html">
                    <i class="fas fa-users"></i>
                    <span>Users Management</span>
                </a>
            </li>

            <li>
                <a href="level.html">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Educational Levels</span>
                </a>
            </li>

            <li class="active">
                <a href="valid.html">
                    <i class="fas fa-check-square"></i>
                    <span>Course Verification</span>
                </a>
            </li>

        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h1>Course Verification</h1>
            <p>Approve or reject submitted courses</p>
        </div>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">
                <div class="icon yellow"><i class="fas fa-clock"></i></div>
                <div>
                    <p>Pending</p>
                    <h2 id="pendingCount">0</h2>
                </div>
            </div>

            <div class="card">
                <div class="icon greenBg"><i class="fas fa-check"></i></div>
                <div>
                    <p>Approved</p>
                    <h2 id="approvedCount">0</h2>
                </div>
            </div>

            <div class="card">
                <div class="icon purple"><i class="fas fa-times"></i></div>
                <div>
                    <p>Rejected</p>
                    <h2 id="rejectedCount">0</h2>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-card">

            <div class="table-header">
                <input id="search" placeholder="Search course...">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Teacher</th>
                        <th>Level</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="courseTable"></tbody>
            </table>

        </div>

    </div>

    <script src="dashboard.js"></script>
    <script src="valid.js"></script>

</body>

</html>
