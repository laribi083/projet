<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${course.title} + ' - BrainLearning'">Course Details - BrainLearning</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" th:href="@{/cssstudent/dashbord.css}">
    <link rel="stylesheet" th:href="@{/cssstudent/course-detail.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">BrainLearning</h1>
            </div>
            <div class="user-profile">
                <div class="user-avatar">
                    <img th:src="@{'https://ui-avatars.com/api/?name=' + ${session.userName} + '&background=6366f1&color=fff&size=128'}" 
                         alt="User Avatar">
                </div>
                <h3 th:text="${session.userName}">Student Name</h3>
                <p class="user-role">Student</p>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/student/dashboard}" class="nav-item">
                    <i class="fas fa-home"></i> Home
                </a>
                <a th:href="@{/niveux}" class="nav-item">
                    <i class="fas fa-book"></i> My courses
                </a>
                <a th:href="@{/student/receive-courses}" class="nav-item active">
                    <i class="fas fa-download"></i> Receive Courses
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="course-detail-container">
                <a th:href="@{/student/receive-courses}" class="back-button">
                    <i class="fas fa-arrow-left"></i> Back to Receive Courses
                </a>
                
                <div class="course-header">
                    <h1 th:text="${course.title}">Course Title</h1>
                    <div class="course-meta">
                        <span class="meta-badge">
                            <i class="fas fa-tag"></i> <span th:text="${course.module}">Module</span>
                        </span>
                        <span class="meta-badge">
                            <i class="fas fa-graduation-cap"></i> <span th:text="${course.niveau}">Level</span>
                        </span>
                        <span class="meta-badge">
                            <i class="fas fa-clock"></i> <span th:text="${course.totalHours}">0</span> hours
                        </span>
                    </div>
                </div>
                
                <div class="course-section">
                    <h2><i class="fas fa-align-left"></i> Description</h2>
                    <div class="description-content" th:text="${course.description}">
                        Course description here...
                    </div>
                    <div class="teacher-info">
                        <i class="fas fa-chalkboard-user"></i>
                        <strong>Professor:</strong> <span th:text="${course.teacherName}">Teacher Name</span>
                        <i class="fas fa-calendar-alt" style="margin-left: auto;"></i>
                        <span th:text="${#temporals.format(course.createdAt, 'dd/MM/yyyy')}">Date</span>
                    </div>
                </div>
                
                <div class="course-section" th:if="${course.fileNames != null and !course.fileNames.isEmpty()}">
                    <h2><i class="fas fa-paperclip"></i> Resources</h2>
                    <ul class="files-list">
                        <li th:each="fileName : ${course.fileNames}">
                            <i class="fas fa-file-alt"></i>
                            <span th:text="${fileName}">file.pdf</span>
                            <button class="btn-download" th:data-course-id="${course.id}" th:data-file-name="${fileName}">
                                <i class="fas fa-download"></i> Download
                            </button>
                        </li>
                    </ul>
                </div>
                
                <div class="course-section" th:unless="${course.fileNames != null and !course.fileNames.isEmpty()}">
                    <h2><i class="fas fa-paperclip"></i> Resources</h2>
                    <p class="description-content">No resources available for this course.</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- JavaScript File -->
    <script th:src="@{/jsstudent/course-detail.js}"></script>
</body>
</html>
