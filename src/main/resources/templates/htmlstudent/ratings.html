<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Notes - BrainLearning</title>
    <link rel="stylesheet" th:href="@{/cssstudent/dashbord.css}">
    <link rel="stylesheet" th:href="@{/cssstudent/ratings.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">BrainLearning</h1>
            </div>
            <div class="user-profile">
                <div class="user-avatar">
                    <img th:src="@{'https://ui-avatars.com/api/?name=' + ${userName} + '&background=6366f1&color=fff&size=128'}" alt="User Avatar">
                </div>
                <h3 th:text="${userName}">Student Name</h3>
                <p class="user-role">Student</p>
            </div>
            <nav class="sidebar-nav">
                <a th:href="@{/student/dashboard}" class="nav-item"><i class="fas fa-home"></i> Home</a>
                <a th:href="@{/niveux}" class="nav-item"><i class="fas fa-book"></i> My courses</a>
                <a th:href="@{/receive-courses}" class="nav-item"><i class="fas fa-download"></i> Receive courses</a>
                <a th:href="@{/student/quizzes}" class="nav-item"><i class="fas fa-question-circle"></i> Quizzes</a>
                <a href="#" class="nav-item active"><i class="fas fa-star"></i> Ratings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="ratings-container">
                <div class="ratings-header">
                    <h1><i class="fas fa-star"></i> My Ratings</h1>
                    <p>View and manage your course ratings</p>
                </div>

                <div class="stats-summary">
                    <div class="stat-box">
                        <div class="number" id="totalRatings">0</div>
                        <div class="label">Courses Rated</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="avgRating">0</div>
                        <div class="label">Average Rating</div>
                        <div class="stars" id="avgStars"></div>
                    </div>
                </div>

                <div class="ratings-grid" id="ratingsGrid">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading your ratings...</div>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/jsstudent/ratings.js}"></script>
</body>
</html>
