<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <title>Login</title>
</head>
<body>
    <div class="card">
        <div class="gradient-top"></div>
        <div class="gradient-small"></div>

        <div class="content">
            <h2>LOG IN</h2>
            <div class="subtitle">To Continue</div>

            <!-- Message d'erreur -->
            <div th:if="${param.error}" class="message" style="color: red;">
                Email ou mot de passe incorrect
            </div>
            <div th:if="${error}" class="message" style="color: red;" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <div class="forgett">
                        <a th:href="@{/forgot}">Forget password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-login">LOG IN</button>
            </form>

            <div class="login-link">
                Don't have an account? <a th:href="@{/create}">Sign up</a>
            </div>
        </div>
    </div>
</body>
</html>
