<!DOCTYPE html>
<html lang="fr">
<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Â· Design Process</title>
    <link rel="stylesheet" href="css/create.css">
</head>
<body>
    <div class="card">
        <div class="design-process">
            <a href="index.html">Back to login</a>
        </div>

        <h2>Sign Up</h2>

        <form id="signupForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="@gmail.com" autocomplete="off">
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder=".............·">
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder=".................·">
                <div class="error-message" id="confirmError"></div>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="+213 6 12 34 56 78">
                <div class="error-message" id="phoneError"></div>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <div class="extra-links">
            <a href="login.html">you have accounte ? login</a>
        </div>
    </div>
<script src="js/create.js"></script>
</body>
</html>
